<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Healio - Healthcare Portal Login</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(135deg, #0a0e27 0%, #16213e 50%, #0f1423 100%);
    }

    .login-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      max-width: 900px;
      width: 100%;
    }

    .login-card {
      background: rgba(22, 33, 62, 0.8);
      border: 2px solid rgba(30, 144, 255, 0.3);
      border-radius: 15px;
      padding: 40px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      text-align: center;
    }

    .login-card:hover {
      border-color: #1e90ff;
      box-shadow: 0 0 20px rgba(30, 144, 255, 0.3);
      transform: translateY(-5px);
    }

    .login-card i {
      font-size: 50px;
      color: #1e90ff;
      margin-bottom: 20px;
    }

    .login-card h2 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #87ceeb;
    }

    .login-card p {
      color: #a0a0c0;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .login-button {
      width: 100%;
      padding: 15px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      background: linear-gradient(135deg, #1e90ff, #87ceeb);
      color: #0a0e27;
      font-weight: 600;
      box-shadow: 0 0 15px rgba(30, 144, 255, 0.4);
    }

    .login-button:hover {
      box-shadow: 0 0 25px rgba(30, 144, 255, 0.7);
      transform: scale(1.02);
    }

    .home-link {
      text-align: center;
      margin-top: 40px;
    }

    .home-link a {
      color: #87ceeb;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
    }

    .home-link a:hover {
      color: #1e90ff;
      transform: translateX(-5px);
    }

    @media (max-width: 768px) {
      .login-cards {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .login-card {
        padding: 30px;
      }
    }
  </style>
</head>
<body>

<!-- ECG Background -->
<svg class="ecg-bg" viewBox="0 0 1000 100">
  <defs>
    <linearGradient id="ecgGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e90ff;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#87ceeb;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#1e90ff;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  <polyline class="ecg-line" points="0,50 50,50 60,40 70,60 80,50 130,50 140,45 150,55 160,50 210,50 220,30 230,70 240,50 290,50 300,50 350,50 400,50 450,50 500,50 550,50 600,50 650,50 700,50 750,50 800,50 850,50 900,50 950,50 1000,50" fill="none" stroke="url(#ecgGradient)" stroke-width="2"/>
</svg>

<div class="login-container">
  <div>
    <div style="text-align: center; margin-bottom: 50px;">
      <h1 style="color: #87ceeb; font-size: 42px; margin-bottom: 10px;">
        <i class="fas fa-heartbeat" style="color: #1e90ff;"></i> Healio
      </h1>
      <p style="color: #a0a0c0;">Professional Healthcare Management Platform</p>
    </div>

    <div class="login-cards">
      <!-- Patient Login -->
      <div class="login-card">
        <i class="fas fa-user-injured"></i>
        <h2>Patient</h2>
        <p>Access your health portal, book appointments, and manage medical records</p>
        <button class="login-button" onclick="window.location.href='patient-login.html'">
          <i class="fas fa-sign-in-alt"></i> Patient Login
        </button>
      </div>

      <!-- Hospital Login -->
      <div class="login-card">
        <i class="fas fa-hospital"></i>
        <h2>Hospital</h2>
        <p>Manage patient appointments, prescriptions, and hospital profile</p>
        <button class="login-button" onclick="window.location.href='hospital-login.html'">
          <i class="fas fa-sign-in-alt"></i> Hospital Login
        </button>
      </div>
    </div>

    <div class="home-link">
      <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
